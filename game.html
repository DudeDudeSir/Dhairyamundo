  <!DOCTYPE html>

<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ധൈര്യമുണ്ടോ? - Game</title>

```
<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;700;900&display=swap" rel="stylesheet">
```

</head>

<body class="game-body">

```
<!-- Background -->
<div class="bg-particles" id="bgParticles"></div>

<!-- Header -->
<header class="game-header">

    <a href="index.html" class="back-btn">
        ← തിരിച്ചു
    </a>

    <div class="stage-info">
        <span>ഘട്ടം</span>
        <span id="stageCounter">1 / 20</span>
    </div>

    <div class="timer-wrap">
        <span>⏱️</span>
        <span id="gameTimer">00:00</span>
    </div>

</header>

<!-- Mascot -->
<div class="game-mascot">

    <div class="mascot-avatar">
        😈
    </div>

    <div id="mascotGameBubble">
        ധൈര്യമുണ്ടോ?
    </div>

</div>

<!-- Stage Area -->
<main class="stage-area" id="stageArea">

    <div class="stage-loading">
        <h2>ലോഡ് ചെയ്യുന്നു...</h2>
    </div>

</main>

<!-- Jump Scare -->
<div id="jumpscareImage" class="jumpscare-screen">

    <img
        src="assets/images/jumpscare.jpg"
        alt="Jump Scare">

</div>

<!-- Transition -->
<div class="stage-transition" id="stageTransition">

    <div class="transition-content">

        <div class="transition-emoji">
            ✅
        </div>

        <div class="transition-text">
            നന്നായി!
        </div>

    </div>

</div>

<!-- Sound -->
<button
    class="sound-toggle"
    id="soundToggle">

    🔊

</button>

<script src="js/stages.js"></script>
<script src="js/app.js"></script>
```
