<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ധൈര്യമുണ്ടോ? - Game</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;700;900&family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="game-body">

  <!-- Particles -->
  <div class="bg-particles" id="bgParticles"></div>

  <!-- GAME HEADER -->
  <header class="game-header">
    <a href="index.html" class="back-btn">← <span class="ml-text">തിരിച്ചു</span></a>

    <div class="stage-info">
      <span class="stage-label ml-text">ഘട്ടം</span>
      <span class="stage-counter" id="stageCounter">1 / 20</span>
    </div>

    <div class="timer-wrap">
      <span class="timer-icon">⏱️</span>
      <span class="timer" id="gameTimer">00:00</span>
    </div>
  </header>

  <!-- PROGRESS BAR -->
<!-- MAIN STAGE AREA -->
<main class="stage-area" id="stageArea">
  <div class="stage-loading">
    <div class="spinner"></div>
    <p class="ml-text">ലോഡ് ചെയ്യുന്നു...</p>
  </div>
</main>
  <!-- MASCOT (floating) -->
  <div class="game-mascot" id="gameMascot">
    <div class="mascot-avatar">😈</div>
    <div class="mascot-game-bubble" id="mascotGameBubble"></div>
  </div>
  <!-- MAIN STAGE AREA -->
  <main class="stage-area" id="stageArea">
    <!-- Stages are injected here by stages.js -->
    <div class="stage-loading">
      <div class="spinner"></div>
      <p class="ml-text">ലോഡ് ചെയ്യുന്നു...</p>
    </div>
  </main>
<div id="jumpscareImage" class="jumpscare-screen">
    <img src="assets/images/jumpscare.jpg" alt="Jump Scare">
</div>
  <!-- TRANSITION OVERLAY -->
  <div class="stage-transition" id="stageTransition">
    <div class="transition-content">
      <div class="transition-emoji" id="transitionEmoji">✅</div>
      <div class="transition-text ml-text" id="transitionText">നന്നായി!</div>
    </div>
  </div>

  <!-- SOUND TOGGLE -->
  <button class="sound-toggle" id="soundToggle" title="Toggle Sound">🔊</button>
  <script src="js/app.js"></script>
</body>
</html>
